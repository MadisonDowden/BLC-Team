<!DOCTYPE html>
<html lang="en">
<head>
  <title>BLC Team Website :: Matches</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css?v=50">
</head>

<body>

<header class="site-header">
  <div class="brand">
    <img src="biglittlecompany.png" alt="Little Big Company Logo">
  </div>

  <nav>
    <ul>
      <li><a href="index.html">HOME</a></li>
      <li><a href="matches.html" class="active">MATCHES</a></li>
      <li><a href="roster.html">ROSTER</a></li>
      <li><a href="scrims.html">SCRIMS</a></li>
      <li><a href="tryouts.html">TRYOUTS</a></li>
    </ul>
  </nav>
</header>

<main class="matches-showcase">

  <section class="matches-title">
    <h1><span>BLC</span> VS</h1>
    <p>UPCOMING SCRIMS</p>
  </section>

  <section id="matchesGrid" class="matches-grid"></section>

  <section class="matches-bottom">
    <p>THREE TEAMS. ONE COMPANY. ONE GOAL.</p>
  </section>

</main>

<script>
const defaultMatches = [
  {
    teamSlot: "MAIN ROSTER",
    team: "OPEN",
    startTime: null,
    date: "NO SCRIM SCHEDULED"
  },
  {
    teamSlot: "VAIL",
    team: "OPEN",
    startTime: null,
    date: "NO SCRIM SCHEDULED"
  },
  {
    teamSlot: "LITTLE SISTER COMPANY",
    team: "OPEN",
    startTime: null,
    date: "NO SCRIM SCHEDULED"
  }
];

function cleanText(text) {
  return String(text || "OPEN").replace(/\*/g, "").trim();
}

function formatDate(startTime, fallback) {
  if (!startTime) return "NO SCRIM SCHEDULED";

  const date = new Date(startTime);

  if (isNaN(date.getTime())) {
    return fallback || "NO SCRIM SCHEDULED";
  }

  return date.toLocaleString("en-US", {
    month: "long",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function getCountdown(startTime) {
  if (!startTime) {
    return {
      days: "--",
      hours: "--",
      minutes: "--",
      seconds: "--",
      status: "WAITING"
    };
  }

  const target = new Date(startTime).getTime();

  if (isNaN(target)) {
    return {
      days: "--",
      hours: "--",
      minutes: "--",
      seconds: "--",
      status: "WAITING"
    };
  }

  const now = new Date().getTime();
  const distance = target - now;

  if (distance <= 0) {
    return {
      days: "00",
      hours: "00",
      minutes: "00",
      seconds: "00",
      status: "LIVE NOW"
    };
  }

  return {
    days: String(Math.floor(distance / (1000 * 60 * 60 * 24))).padStart(2, "0"),
    hours: String(Math.floor((distance / (1000 * 60 * 60)) % 24)).padStart(2, "0"),
    minutes: String(Math.floor((distance / (1000 * 60)) % 60)).padStart(2, "0"),
    seconds: String(Math.floor((distance / 1000) % 60)).padStart(2, "0"),
    status: "UPCOMING"
  };
}

function buildMatchCard(match, index) {
  const labels = [
    "MAIN ROSTER",
    "VAIL",
    "LITTLE SISTER COMPANY"
  ];

  const colors = [
    "pink-card",
    "purple-card",
    "blue-card"
  ];

  const countdown = getCountdown(match.startTime);

  return `
    <article class="match-card-new ${colors[index]}">
      <p class="team-label">${labels[index]}</p>

      <div class="logo-row">
        <img src="biglittlecompany.png" alt="Little Big Company Logo">
      </div>

      <div class="versus-stack">
        <h2>BLC</h2>
        <div class="vs-badge">VS</div>
        <h3>${cleanText(match.team)}</h3>
      </div>

      <p class="card-date">
        ${formatDate(match.startTime, match.date)}
      </p>

      <p class="starts-label">SCRIM STARTS IN</p>

      <div class="countdown-new">
        <div><span>${countdown.days}</span><small>DAYS</small></div>
        <div><span>${countdown.hours}</span><small>HOURS</small></div>
        <div><span>${countdown.minutes}</span><small>MINUTES</small></div>
        <div><span>${countdown.seconds}</span><small>SECONDS</small></div>
      </div>

      <p class="status-pill">${countdown.status}</p>
    </article>
  `;
}

function renderMatches(matches) {
  const slots = [
    "MAIN ROSTER",
    "VAIL",
    "LITTLE SISTER COMPANY"
  ];

  const displayMatches = slots.map((slot, index) => {
    const teamMatch = matches
      .filter(match =>
        match.status === "Approved" &&
        match.teamSlot === slot
      )
      .pop();

    return teamMatch || defaultMatches[index];
  });

  document.getElementById("matchesGrid").innerHTML =
    displayMatches
      .map((match, index) => buildMatchCard(match, index))
      .join("");
}

fetch("matches.json?v=" + Date.now())
  .then(response => response.json())
  .then(matches => {
    renderMatches(matches);

    setInterval(() => {
      renderMatches(matches);
    }, 1000);
  })
  .catch(() => {
    renderMatches([]);
  });
</script>

</body>
</html>

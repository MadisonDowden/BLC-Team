<!DOCTYPE html>
<html lang="en">
<head>
  <title>BLC Team Website :: Matches</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css?v=3">
</head>

<body>

<header class="site-header">
  <div class="brand">
    <a href="index.html"><img src="logo.webp" alt="BLC Logo"></a>
  </div>

  <nav>
    <ul>
      <li><a href="index.html">HOME</a></li>
      <li><a href="matches.html" class="active">MATCHES</a></li>
      <li><a href="roster.html">ROSTER</a></li>
      <li><a href="scrims.html">SCRIMS</a></li>
      <li><a href="tryouts.html">TRYOUTS</a></li>
    </ul>
  </nav>
</header>

<main class="matches-page">

  <img src="images/blc-player.png" class="match-player left-match-player" alt="BLC Player">

  <img src="images/estf-player.png" class="match-player right-match-player" alt="ESTF Player">

  <section class="center-content">
    <h1><span>BLC</span><br>VS</h1>
    <p class="scrim-title">RAZE</p>

    <div class="live-card">
      <p class="next">NEXT SCRIM</p>

      <div class="teams">
        <span id="teamOne">BLC</span>
        <span>VS</span>
        <span id="teamTwo">RAZE</span>
      </div>

      <p id="matchDate" class="match-date">May 25, 2026 • 8:00 PM EST</p>

      <p class="starts">SCRIMS START IN</p>

      <div class="countdown">
        <div><span id="days">00</span><small>DAYS</small></div>
        <div><span id="hours">00</span><small>HOURS</small></div>
        <div><span id="minutes">00</span><small>MINUTES</small></div>
        <div><span id="seconds">00</span><small>SECONDS</small></div>
      </div>
    </div>
  </section>

</main>

<script>
let matchInfo = {
  teamOne: "BLC",
  teamTwo: "TBD",
  displayDate: "No scrim scheduled yet",
  startTime: null
};

fetch("matches.json?v=" + Date.now())
  .then(response => response.json())
  .then(matches => {
    if (matches.length > 0) {
      const latestMatch = matches[matches.length - 1];

      matchInfo.teamOne = "BLC";
      matchInfo.teamTwo = latestMatch.team.replace(/\*/g, "").trim();
      matchInfo.startTime = latestMatch.startTime;

      const matchDateObj = new Date(matchInfo.startTime);

      if (!isNaN(matchDateObj.getTime())) {
        matchInfo.displayDate = matchDateObj.toLocaleString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit"
        });
      } else {
        matchInfo.displayDate = latestMatch.date;
      }

      document.querySelector(".scrim-title").textContent = matchInfo.teamTwo;
      document.getElementById("teamOne").textContent = matchInfo.teamOne;
      document.getElementById("teamTwo").textContent = matchInfo.teamTwo;
      document.getElementById("matchDate").textContent = matchInfo.displayDate;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  });

function updateCountdown() {
  if (!matchInfo.startTime) {
    document.querySelector(".countdown").innerHTML = "<h2>No Scrim Scheduled</h2>";
    return;
  }

  const targetTime = new Date(matchInfo.startTime).getTime();
  const now = new Date().getTime();
  const distance = targetTime - now;

  if (isNaN(targetTime)) {
    document.querySelector(".countdown").innerHTML = "<h2>Date Not Set</h2>";
    return;
  }

  if (distance <= 0) {
    document.querySelector(".countdown").innerHTML = "<h2>LIVE NOW</h2>";
    return;
  }

  document.getElementById("days").textContent =
    Math.floor(distance / (1000 * 60 * 60 * 24));

  document.getElementById("hours").textContent =
    Math.floor((distance / (1000 * 60 * 60)) % 24);

  document.getElementById("minutes").textContent =
    Math.floor((distance / (1000 * 60)) % 60);

  document.getElementById("seconds").textContent =
    Math.floor((distance / 1000) % 60);
}
</script>
